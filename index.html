<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&family=Young+Serif&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Frontend Mentor | Results summary component</title>

  </head>
  <body>
    <main>
      <article class="result-card">
        <section class="result">
          <h2>Your Result</h2>
          <div class="score-circle">
            <h1>76</h1>
            <p>of 100</p>
          </div>
          <h3>Great</h3>
          <p>
            You scored higher than 65% of the people who have taken these tests.
          </p>
        </section>
        <section class="summary">
          <h2>Summary</h2>
          <div class="summary-item">
            <div class="summary-left">
              <img src="./images/icon-reaction.svg" alt=Reaction icon"">
              <span>Reaction</span>
            </div>
            <p>80 <span> / 100</span></p>
          </div>
          <div class="summary-item">
            <div class="summary-left">
              <img src="./images/icon-memory.svg" alt="memory icon">
              <span>Memory</span>
            </div>
            <p>92 <span> / 100</span></p>
          </div>
          <div class="summary-item">
            <div class="summary-left">
              <img src="./images/icon-verbal.svg" alt="verbal image">
              <span>Verbal</span>
            </div>
            <p>61 <span> / 100</span></p>
          </div>
          <div class="summary-item">
            <div class="summary-left">
              <img src="./images/icon-visual.svg" alt="visual image">
              <span>Visual</span>
            </div>
            <p>72 <span> / 100</span></p>
          </div>
          <button>Continue</button>
        </section>
      </article>
    </main>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">SOMISETTI NAGA VEERA SRI CHARAN</a>.
    </footer>
  </body>
</html>
